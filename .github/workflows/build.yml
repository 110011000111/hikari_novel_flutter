name: Build Hikari Novel APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'   # 自动使用最新的稳定版

      - name: 启用 Flutter 桌面支持 (用于 Windows/macOS 编译)
        run: |
          flutter config --enable-windows-desktop
          flutter config --enable-macos-desktop
          flutter config --enable-linux-desktop

      - name: 获取项目依赖
        run: flutter pub get
    
      # 新增：解码签名文件
      - name: 解码签名文件
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 --decode > android/app/upload-keystore.jks
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
    
      # 新增：创建 key.properties
      - name: 创建 key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
    
      # 替换原有的编译命令
      - name: 编译 Android APK (Release)
        run: flutter build apk --release

      - name: 上传 APK (Release) 至工作流
        uses: actions/upload-artifact@v4
        with:
          name: hikari-novel-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
